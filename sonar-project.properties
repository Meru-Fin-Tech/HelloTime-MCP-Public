# SonarQube / SonarCloud configuration for the HelloTime public MCP server.
#
# The analyzer must scan ONLY the TypeScript sources under src/. The compiled
# output in dist/ is gitignored but is present on disk after `npm run build`.
# If dist/ is scanned it has no SCM (git) blame, so Sonar attributes every line
# to the analysis date and treats it ALL as "new code". That single mistake is
# what produced the three Quality Gate failures at once:
#   - Duplication: dist/*.js mirror src/*.ts, and *.d.ts mirror the interfaces.
#   - Coverage 0%: the lcov report maps to src/, never to dist/.
#   - New issues:  compiled JS carries smells that the source does not.
# Scoping to src/ and excluding dist/ keeps the gate measuring real code.

sonar.projectKey=ai-mcp-hellotime
# sonar.organization=<your-sonarcloud-org>   # set when running on SonarCloud

sonar.sources=src
sonar.tests=test
sonar.test.inclusions=test/**/*.test.ts
sonar.sourceEncoding=UTF-8

# Never analyze build output, dependencies, coverage data, declaration files,
# or one-off maintenance scripts.
sonar.exclusions=dist/**,node_modules/**,coverage/**,scripts/**,**/*.d.ts

# Coverage report produced by `npm run coverage` (Node's built-in test runner).
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Server bootstrap / transport wiring is exercised by integration runs, not the
# unit suite; exclude it from the coverage denominator so the ratio reflects
# testable business logic rather than process plumbing.
sonar.coverage.exclusions=src/http.ts,src/stdio.ts,src/server.ts,src/version.ts

# Static data catalogs are intentionally repetitive — one record per plan, rate,
# market, or competitor. Block-level "duplication" there is data, not a
# maintainability defect, so exclude it from copy/paste detection.
sonar.cpd.exclusions=src/data/**
